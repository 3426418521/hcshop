[pytest]
; 测试文件搜索路径
testpaths = test

; 测试文件命名规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

; 标记分类
markers =
    api: API接口测试
    ui: UI自动化测试
    smoke: 冒烟测试
    regression: 回归测试
    slow: 慢速测试（需要较长时间）

; 默认命令行参数
addopts = -v --tb=short --strict-markers

; 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

; 忽略目录
norecursedirs = .git .venv venv env node_modules

; 超时配置（需要 pytest-timeout 插件）
; timeout = 300

; 并行执行配置（需要 pytest-xdist 插件）
; addopts = -n auto