    - "微信支付"
    - "支付宝"
    - "银联支付"

# --------------------------------------------
# 5. 购物车配置
# --------------------------------------------
cart:
  # 修改后的数量
  update_quantity: 3

  # 批量删除数量阈值
  max_items_for_test: 10

# --------------------------------------------
# 6. 消息配置
# --------------------------------------------
message:
  # 测试消息标题
  test_title: "系统通知"

  # 测试消息内容
  test_content: "这是一条测试消息"

# --------------------------------------------
# 7. 个人中心配置
# --------------------------------------------
profile:
  # 修改后的昵称
  new_nickname: "新昵称测试"

  # 头像路径（相对项目根目录）
  avatar_path: "data/test_avatar.jpg"

  # 修改密码
  password_change:
    old_password: "123456"
    new_password: "123456"
    confirm_password: "123456"

# --------------------------------------------
# 8. 页面 URL 路径（相对路径）
# --------------------------------------------
urls:
  home: "/"
  login: "/index.php?s=/index/user/logininfo.html"
  cart: "/index.php?s=/index/cart/index.html"
  order_list: "/index.php?s=/index/order/index.html"
  address: "/index.php?s=/index/useraddress/index.html"
  collect: "/index.php?s=/index/usergoodsfavor/index.html"
  message: "/index.php?s=/index/message/index.html"
  profile: "/index.php?s=/index/user/index.html"
  product_list: "/index.php?s=/index/search/index.html"

# --------------------------------------------
# 9. 浏览器配置
# --------------------------------------------
browser:
  # 默认浏览器
  default: "chrome"

  # 可选浏览器
  supported:
    - "chrome"
    - "firefox"
    - "edge"

  # 窗口大小
  window_size:
    width: 1920
    height: 1080

  # 隐式等待（秒）
  implicit_wait: 10

  # 页面加载超时（秒）
  page_load_timeout: 30

# --------------------------------------------
# 10. API 配置
# --------------------------------------------
api:
  # 基础 URL
  base_url: "http://shop-xo.hctestedu.com"

  # API 路径前缀
  prefix: "/index.php?s="

  # 超时配置
  timeout:
    connect: 5
    read: 30

  # 重试次数
  retries: 3

  # 请求头
  headers:
    Accept: "application/json"
    Content-Type: "application/json"